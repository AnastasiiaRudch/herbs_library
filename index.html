<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя Бібліотека Трав 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f8f6f0;
    --blush: #ede8df;
    --sage: #b8c9b0;
    --dusty-rose: #c4a090;
    --lavender: #c0b8c8;
    --peach: #d8c0a0;
    --forest: #6a8e6e;
    --muted-text: #7a7068;
    --dark: #2d2820;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #e8f0e0 0%, #ede8d8 40%, #dde4d4 100%);
    padding: 60px 40px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(168,192,160,0.3) 0%, transparent 70%);
    top: -100px; right: -100px; border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(196,180,152,0.3) 0%, transparent 70%);
    bottom: -80px; left: -80px; border-radius: 50%;
  }
  .hero-emoji { font-size: 3rem; display: block; margin-bottom: 16px; }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 300;
    color: var(--dark);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .hero h1 span { font-style: italic; color: #5a7a4a; }
  .hero-sub {
    margin-top: 12px;
    font-size: 0.95rem;
    color: var(--muted-text);
    letter-spacing: 0.08em;
    font-weight: 300;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 36px;
    flex-wrap: wrap;
  }
  .stat {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 16px 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.8);
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--dark);
    display: block;
  }
  .stat-label { font-size: 0.75rem; color: var(--muted-text); letter-spacing: 0.1em; text-transform: uppercase; }

  /* FILTERS */
  .filter-section {
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(248,246,240,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .filter-toggle-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .filter-toggle-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .active-cat-chip {
    font-size: 0.8rem;
    background: var(--dark);
    color: white;
    border-radius: 20px;
    padding: 4px 12px;
    font-weight: 400;
  }
  .toggle-icon {
    font-size: 0.75rem;
    color: var(--muted-text);
    transition: transform 0.3s ease;
    display: inline-block;
  }
  .toggle-icon.open { transform: rotate(180deg); }
  .filter-label {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted-text);
    font-weight: 500;
  }
  .filters-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease, padding 0.3s ease;
  }
  .filters-body.open {
    max-height: 400px;
    padding-top: 12px;
  }
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    border: 1.5px solid transparent;
    border-radius: 30px;
    padding: 8px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 0.83rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-btn.all { background: var(--dark); color: white; border-color: var(--dark); }
  .filter-btn[data-cat="protection"]  { background: #eef2f5; border-color: #8aadca; color: #2a5a7a; }
  .filter-btn[data-cat="cleansing"]   { background: #f5f0ff; border-color: #b0a0d0; color: #5a3a8a; }
  .filter-btn[data-cat="wealth"]      { background: #fff8e8; border-color: #d4a840; color: #7a5a10; }
  .filter-btn[data-cat="kohannya"]    { background: #fdf0f4; border-color: #e8a0b8; color: #8a3050; }
  .filter-btn[data-cat="intuition"]   { background: #f0eef8; border-color: #9080c0; color: #3a2878; }
  .filter-btn[data-cat="calm"]        { background: #eef5f8; border-color: #80b0c0; color: #2a5868; }
  .filter-btn[data-cat="healing"]     { background: #eef5ee; border-color: #78b080; color: #2a5a30; }
  .filter-btn[data-cat="success"]     { background: #fdf8e8; border-color: #d8b840; color: #705a10; }
  .filter-btn[data-cat="home"]        { background: #f5f0e8; border-color: #c0a878; color: #6a4a20; }
  .filter-btn[data-cat="grounding"]   { background: #f0ede8; border-color: #b09880; color: #5a3a28; }
  .filter-btn[data-cat="beauty"]      { background: #fdf4f8; border-color: #e0a0c0; color: #8a2060; }
  .filter-btn.active { box-shadow: 0 4px 14px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .filter-btn:not(.active):hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.08); }

  .search-box {
    margin-top: 10px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    max-width: 400px;
    border: 1.5px solid #e0d8d0;
    border-radius: 30px;
    padding: 10px 20px 10px 42px;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    background: white;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--forest); }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    opacity: 0.5;
  }

  /* GRID */
  .grid-section { padding: 32px 40px 60px; }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    color: var(--muted-text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .herbs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 20px;
  }

  /* HERB CARD */
  .herb-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    transition: all 0.3s ease;
    border: 1px solid rgba(0,0,0,0.04);
    animation: fadeIn 0.4s ease forwards;
  }
  .herb-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .herb-card.hidden { display: none; }

  .card-header {
    padding: 22px 22px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .herb-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: #eef5ee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .herb-title { flex: 1; }
  .herb-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.2;
  }
  .herb-latin {
    font-size: 0.75rem;
    color: var(--muted-text);
    font-style: italic;
    margin-top: 2px;
  }

  /* MULTI-CATEGORY BADGES */
  .cat-badges-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 0 22px 14px;
  }
  .cat-badge {
    font-size: 0.65rem;
    border-radius: 20px;
    padding: 3px 10px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: 1px solid;
  }
  .cat-badge.protection  { background: #eef2f5; border-color: #8aadca; color: #2a5a7a; }
  .cat-badge.cleansing   { background: #f5f0ff; border-color: #b0a0d0; color: #5a3a8a; }
  .cat-badge.wealth      { background: #fff8e8; border-color: #d4a840; color: #7a5a10; }
  .cat-badge.kohannya    { background: #fdf0f4; border-color: #e8a0b8; color: #8a3050; }
  .cat-badge.intuition   { background: #f0eef8; border-color: #9080c0; color: #3a2878; }
  .cat-badge.calm        { background: #eef5f8; border-color: #80b0c0; color: #2a5868; }
  .cat-badge.healing     { background: #eef5ee; border-color: #78b080; color: #2a5a30; }
  .cat-badge.success     { background: #fdf8e8; border-color: #d8b840; color: #705a10; }
  .cat-badge.home        { background: #f5f0e8; border-color: #c0a878; color: #6a4a20; }
  .cat-badge.grounding   { background: #f0ede8; border-color: #b09880; color: #5a3a28; }
  .cat-badge.beauty      { background: #fdf4f8; border-color: #e0a0c0; color: #8a2060; }

  .card-desc {
    padding: 0 22px 16px;
    font-size: 0.87rem;
    color: var(--muted-text);
    line-height: 1.65;
    font-weight: 300;
  }

  .props-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 22px 16px;
  }
  .prop-tag {
    font-size: 0.72rem;
    background: var(--cream);
    border: 1px solid #e8e0d8;
    border-radius: 20px;
    padding: 4px 10px;
    color: var(--muted-text);
    letter-spacing: 0.04em;
  }

  /* EXPAND SECTION */
  .expand-btn {
    width: calc(100% - 44px);
    margin: 0 22px 18px;
    border: 1.5px dashed #e0d8d0;
    background: transparent;
    border-radius: 12px;
    padding: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    color: var(--muted-text);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    letter-spacing: 0.04em;
  }
  .expand-btn:hover { background: var(--cream); border-color: var(--forest); color: var(--dark); }
  .expand-btn .arrow { transition: transform 0.3s ease; display: inline-block; }
  .expand-btn.open .arrow { transform: rotate(180deg); }

  .expand-content {
    display: none;
    padding: 0 22px 20px;
    border-top: 1px solid #f0ebe4;
    margin-top: -4px;
  }
  .expand-content.open { display: block; }
  .expand-section-title {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted-text);
    margin: 16px 0 8px;
    font-weight: 500;
  }
  .usage-list {
    list-style: none;
    padding: 0;
  }
  .usage-list li {
    font-size: 0.84rem;
    color: var(--dark);
    padding: 6px 0;
    border-bottom: 1px solid #f5f0ea;
    display: flex;
    gap: 8px;
    line-height: 1.5;
  }
  .usage-list li:last-child { border-bottom: none; }
  .usage-list li::before { content: '·'; color: var(--forest); font-size: 1.2rem; line-height: 1.2; }

  .recipe-box {
    background: var(--cream);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 10px;
  }
  .recipe-title {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--dark);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .recipe-text {
    font-size: 0.8rem;
    color: var(--muted-text);
    line-height: 1.6;
  }

  .count-label {
    font-size: 0.8rem;
    color: var(--muted-text);
    margin-left: 8px;
    font-family: 'Jost', sans-serif;
  }

  @media (max-width: 600px) {
    .hero { padding: 40px 20px 36px; }
    .filter-section { padding: 12px 16px; }
    .grid-section { padding: 20px 16px 50px; }
    .stats-row { gap: 16px; }
  }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-emoji">🌿</span>
  <h1>Моя <span>Бібліотека</span> Трав</h1>
  <p class="hero-sub">Магічне та цілюще зілля · Особиста колекція</p>
  <div class="stats-row">
    <div class="stat"><span class="stat-num">23</span><span class="stat-label">Трав у колекції</span></div>
    <div class="stat"><span class="stat-num">10</span><span class="stat-label">Категорій</span></div>
    <div class="stat"><span class="stat-num" id="multi-cat-count">23</span><span class="stat-label">Мультикатегорійних</span></div>
  </div>
</div>

<div class="filter-section">
  <div class="filter-toggle-bar" onclick="toggleFilters()">
    <div class="filter-toggle-left">
      <span class="filter-label">🌿 Фільтр</span>
      <span class="active-cat-chip" id="activeCatLabel">✨ Всі</span>
    </div>
    <span class="toggle-icon" id="toggleIcon">▾</span>
  </div>
  <div class="filters-body" id="filtersBody">
    <div class="filters">
      <button class="filter-btn all active" onclick="filterHerbs('all', '✨ Всі')">✨ Всі</button>
      <button class="filter-btn" data-cat="protection"  onclick="filterHerbs('protection',  '🛡️ Захист')">🛡️ Захист</button>
      <button class="filter-btn" data-cat="cleansing"   onclick="filterHerbs('cleansing',   '✨ Очищення')">✨ Очищення</button>
      <button class="filter-btn" data-cat="wealth"      onclick="filterHerbs('wealth',      '💰 Достаток')">💰 Достаток</button>
      <button class="filter-btn" data-cat="kohannya"   onclick="filterHerbs('kohannya',     '❤️ Кохання')">❤️ Кохання</button>
      <button class="filter-btn" data-cat="intuition"   onclick="filterHerbs('intuition',   '🔮 Інтуїція')">🔮 Інтуїція</button>
      <button class="filter-btn" data-cat="calm"        onclick="filterHerbs('calm',        '🌙 Спокій')">🌙 Спокій</button>
      <button class="filter-btn" data-cat="healing"     onclick="filterHerbs('healing',     '🌿 Зцілення')">🌿 Зцілення</button>
      <button class="filter-btn" data-cat="success"     onclick="filterHerbs('success',     '🌞 Успіх')">🌞 Успіх</button>
      <button class="filter-btn" data-cat="home"        onclick="filterHerbs('home',        '🏡 Дім і родина')">🏡 Дім і родина</button>
      <button class="filter-btn" data-cat="grounding"   onclick="filterHerbs('grounding',   '🌍 Заземлення')">🌍 Заземлення</button>
      <button class="filter-btn" data-cat="beauty"     onclick="filterHerbs('beauty','💄 Краса')">💄 Краса</button>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Пошук трави..." oninput="searchHerbs(this.value)">
    </div>
  </div>
</div>

<div class="grid-section">
  <div class="herbs-grid" id="herbsGrid"></div>
  <p id="no-results" style="display:none; text-align:center; color:var(--muted-text); padding:60px 0; font-style:italic; font-family:'Cormorant Garamond',serif; font-size:1.3rem;">Нічого не знайдено 🌿</p>
</div>

<script>

function renderCard(herb) {
  const catBadges = herb.cats.map(c => `<span class="cat-badge ${c}">${catLabels[c] || c}</span>`).join('');
  const propTags = herb.props.map(p => `<span class="prop-tag">${p}</span>`).join('');
  const usageItems = herb.uses.map(u => `<li>${u}</li>`).join('');
  const id = herb.name.replace(/[^а-яёіїєa-z]/gi, '_');

  return `
  <div class="herb-card" data-cats="${herb.cats.join(',')}" data-name="${herb.name.toLowerCase()}">
    <div class="card-header">
      <div class="herb-icon">${herb.emoji}</div>
      <div class="herb-title">
        <div class="herb-name">${herb.name}</div>
        <div class="herb-latin">${herb.latin}</div>
      </div>
    </div>
    <div class="cat-badges-row">${catBadges}</div>
    <p class="card-desc">${herb.desc}</p>
    <div class="props-row">${propTags}</div>
    <button class="expand-btn" onclick="toggleExpand('${id}', this)">
      Способи застосування та рецепти <span class="arrow">▾</span>
    </button>
    <div class="expand-content" id="exp_${id}">
      <div class="expand-section-title">💡 Способи застосування</div>
      <ul class="usage-list">${usageItems}</ul>
      ${herb.recipe ? `
      <div class="expand-section-title" style="margin-top:16px">🧪 Рецепт</div>
      <div class="recipe-box">
        <div class="recipe-title">${herb.recipe.title}</div>
        <div class="recipe-text">${herb.recipe.text}</div>
      </div>` : ''}
    </div>
  </div>`;
}

let currentFilter = 'all';
let currentSearch = '';

function renderAll() {
  const grid = document.getElementById('herbsGrid');
  grid.innerHTML = herbs.map(renderCard).join('');
  applyFilters();
}

function applyFilters() {
  const cards = document.querySelectorAll('.herb-card');
  let visible = 0;
  cards.forEach(card => {
    const cats = card.dataset.cats.split(',');
    const matchCat = currentFilter === 'all' || cats.includes(currentFilter);
    const matchSearch = !currentSearch || card.dataset.name.includes(currentSearch.toLowerCase());
    if (matchCat && matchSearch) {
      card.classList.remove('hidden');
      card.style.animationDelay = (visible * 0.04) + 's';
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
}

function toggleFilters() {
  const body = document.getElementById('filtersBody');
  const icon = document.getElementById('toggleIcon');
  const isOpen = body.classList.toggle('open');
  icon.classList.toggle('open', isOpen);
}

function filterHerbs(cat, label) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active',
      (cat === 'all' && btn.classList.contains('all')) || btn.dataset.cat === cat
    );
  });
  document.getElementById('activeCatLabel').textContent = label || '✨ Всі';
  document.getElementById('filtersBody').classList.remove('open');
  document.getElementById('toggleIcon').classList.remove('open');
  applyFilters();
}

function searchHerbs(val) {
  currentSearch = val.trim().toLowerCase();
  applyFilters();
}

function toggleExpand(id, btn) {
  const content = document.getElementById('exp_' + id);
  const isOpen = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.querySelector('.arrow').style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}

renderAll();
</script>
</body>
</html>
